<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuoteBot - AI Quote Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="connection-status connecting" id="connection-status">
        <span class="status-dot"></span>
        <span id="status-text">Connecting...</span>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="bot-avatar"><img src="../demo_chat.png" alt="Bot"></div>
            <div class="header-info">
                <h2>QuoteBot <span class="verified-badge">✓</span></h2>
                <p><span class="status-dot"></span> AI-powered quote assistant</p>
            </div>
            <div class="header-actions">
                <button class="header-btn" onclick="clearChat()" title="Clear chat">🗑️</button>
                <button class="header-btn" onclick="toggleSound()" title="Toggle sound">🔊</button>
            </div>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="welcome-message">
                <div class="welcome-icon">✨</div>
                <h3>Welcome to QuoteBot!</h3>
                <p>I'm your personal AI assistant for discovering inspiring, motivational, and heartwarming quotes. How can I help you today?</p>
            </div>
        </div>

        <div class="quick-replies">
            <button class="quick-reply-btn" onclick="sendQuickMessage('I need inspiration')">🌟 Inspiration</button>
            <button class="quick-reply-btn" onclick="sendQuickMessage('Tell me a funny quote')">😄 Funny</button>
            <button class="quick-reply-btn" onclick="sendQuickMessage('Love quotes')">❤️ Love</button>
            <button class="quick-reply-btn" onclick="sendQuickMessage('Success quotes')">🎯 Success</button>
        </div>

        <div class="chat-input-container">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
            </div>
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <footer class="team-credits">
        <div class="credits-container">
            <p class="credits-label">Created by</p>
            <div class="team-members">
                <span class="team-member">Meet Shah</span>
                <span class="separator">•</span>
                <span class="team-member">Mayuresh Kulkarni</span>
                <span class="separator">•</span>
                <span class="team-member">Mohit Mukane</span>
                <span class="separator">•</span>
                <span class="team-member">Naisargi Meshram</span>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
